# Enable the MPSL coexistence interface and select the COEXC IPC
# implementation that arbitrates radio access between Wi-Fi and the
# short-range radio via the COEXC peripheral on the nRF7120.
CONFIG_MPSL_CX=y
CONFIG_MPSL_CX_NRF_COEXC_IPC=y
